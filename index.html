<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Anamnese Viva Next</title>

<style>
body {
    font-family: Arial;
    background: #0a1f33;
    color: white;
    padding: 20px;
}
.container {
    max-width: 700px;
    margin: auto;
    background: #0a1f33;
    padding: 20px;
    border-radius: 10px;
}
.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.logo {
    width: 120px;
}
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: none;
}
button {
    padding: 14px;
    background: linear-gradient(45deg, #00cfff, #0077ff);
    border: none;
    cursor: pointer;
    width: 100%;
    font-weight: bold;
    font-size: 16px;
    border-radius: 8px;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.02);
    opacity: 0.9;
}
.sugestoes button {
    width: auto;
    margin: 5px;
    background: #444;
    font-size: 13px;
    padding: 8px 12px;
}
.hidden {
    display: none;
}

/* 🔥 BOTÃO PDF NOVO */
.btn-pdf {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, #ff1a1a, #b30000);
    color: white;
    border: none;
    padding: 14px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    transition: all 0.2s ease;
}

.btn-pdf:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}

.btn-pdf:active {
    transform: scale(0.96);
}

.btn-pdf svg {
    width: 26px;
    height: 26px;
}
</style>
</head>

<body>

<div class="container" id="formulario">

<div class="topo">
    <h2>Anamnese Viva Next</h2>
    <img src="logo.png" class="logo">
</div>

<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="peso" placeholder="Peso (kg)">
<input id="altura" placeholder="Altura (cm)">
<input id="telefone" placeholder="DDD+Número">

<h4>Qual Objetivo</h4>
<div class="sugestoes">
<button onclick="setVal('objetivo','Emagrecimento')">Emagrecimento</button>
<button onclick="setVal('objetivo','Hipertrofia')">Hipertrofia</button>
<button onclick="setVal('objetivo','Saúde')">Saúde</button>
<button onclick="setVal('objetivo','Reeducação Alimentar')">Reeducação Alimentar</button>
<button onclick="setVal('objetivo','Performance')">Performance</button>
</div>
<input id="objetivo">

<h4>Refeições</h4>
<div class="sugestoes">
<button onclick="setVal('refeicoes','2-3')">2-3</button>
<button onclick="setVal('refeicoes','4-5')">4-5</button>
<button onclick="setVal('refeicoes','6')">6</button>
</div>
<input id="refeicoes">

<h4>Biotipo</h4>
<div class="sugestoes">
<button onclick="setVal('biotipo','Ectomorfo')">Ectomorfo</button>
<button onclick="setVal('biotipo','Mesomorfo')">Mesomorfo</button>
<button onclick="setVal('biotipo','Endomorfo')">Endomorfo</button>
</div>
<input id="biotipo">

<h4>Dificuldade</h4>
<div class="sugestoes">
<button onclick="setVal('dificuldade','Tenho Compulsão')">Compulsão</button>
<button onclick="setVal('dificuldade','Preciso ser mais Disciplinado(a)')">Disciplina</button>
<button onclick="setVal('dificuldade','Rotina')">Rotina</button>
</div>
<input id="dificuldade">

<h4>Sono</h4>
<div class="sugestoes">
<button onclick="setVal('sono','Ruim')">Ruim</button>
<button onclick="setVal('sono','Regular')">Regular</button>
<button onclick="setVal('sono','Boa')">Boa</button>
</div>
<input id="sono">

<h4>Qual Esporte Pratica?</h4>
<div class="sugestoes">
<button onclick="setVal('esporte','Musculação')">Musculação</button>
<button onclick="setVal('esporte','Corrida')">Corrida</button>
<button onclick="setVal('esporte','Vôlei')">Vôlei</button>
<button onclick="setVal('esporte','Outro')">Outro.Qual?</button>
</div>
<input id="esporte">

<h4>Treino</h4>
<div class="sugestoes">
<button onclick="setVal('treino','Não treina')">Não</button>
<button onclick="setVal('treino','3x semana')">3x</button>
<button onclick="setVal('treino','5x+ semana')">5x+</button>
<button onclick="setVal('treino','Em casa')">Em casa</button>
</div>
<input id="treino">

<h4>Possui Alguma Condição Médica?</h4>
<div class="sugestoes">
<button onclick="setVal('condicao','Sim')">Sim?Qual?</button>
<button onclick="setVal('condicao','Não')">Não</button>
</div>
<input id="condicao">

<h4>Faz uso de Medicamento Contínuo?</h4>
<div class="sugestoes">
<button onclick="setVal('medicamento','Sim')">Sim?Qual?</button>
<button onclick="setVal('medicamento','Não')">Não</button>
</div>
<input id="medicamento">

<h4>Possui dores frequentes?</h4>
<div class="sugestoes">
<button onclick="setVal('dores','Sim')">Sim?Onde?</button>
<button onclick="setVal('dores','Não')">Não</button>
</div>
<input id="dores">

<h4>Consumo de Álcool</h4>
<div class="sugestoes">
<button onclick="setVal('alcool','Sim')">Sim</button>
<button onclick="setVal('alcool','Não')">Não</button>
<button onclick="setVal('alcool','Às vezes')">Às vezes</button>
</div>
<input id="alcool">

<h4>Fuma?</h4>
<div class="sugestoes">
<button onclick="setVal('fuma','Sim')">Sim</button>
<button onclick="setVal('fuma','Não')">Não</button>
<button onclick="setVal('fuma','Às vezes')">Às vezes</button>
</div>
<input id="fuma">

<!-- 🔥 BOTÃO NOVO -->
<button id="btnPDF" onclick="gerarPDF()" class="btn-pdf">
  <span>
    <svg viewBox="0 0 24 24">
      <path d="M6 2h7l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="none" stroke="white" stroke-width="2"/>
      <text x="6" y="14" font-size="6" fill="white">PDF</text>
      <path d="M12 16v4M9 18l3 3 3-3" stroke="white" stroke-width="2" fill="none"/>
    </svg>
  </span>
  <span>Gerar PDF</span>
</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
function setVal(id, val){
    document.getElementById(id).value = val;
}

function gerarPDF(){

const { jsPDF } = window.jspdf;

let botoes = document.querySelectorAll("button");
botoes.forEach(btn => btn.classList.add("hidden"));

let elemento = document.getElementById("formulario");

html2canvas(elemento, { scale: 2 }).then(canvas => {

    let imgData = canvas.toDataURL("image/png");
    let pdf = new jsPDF('p', 'mm', 'a4');

    let largura = 210;
    let altura = (canvas.height * largura) / canvas.width;

    let alturaRestante = altura;
    let posicao = 0;

    while (alturaRestante > 0) {
        pdf.addImage(imgData, 'PNG', 0, posicao, largura, altura);
        alturaRestante -= 297;

        if (alturaRestante > 0) {
            pdf.addPage();
            posicao = -297;
        }
    }

    let nome = document.getElementById("nome").value || "Aluno";
    pdf.save(`Anamnese_${nome}.pdf`);

    botoes.forEach(btn => btn.classList.remove("hidden"));

});
}
</script>

</body>
</html>
